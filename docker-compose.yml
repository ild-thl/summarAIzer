# Standalone docker-compose for summaraizer development
# Includes all required services (postgres, redis, chroma)
# Use this if you're developing summaraizer only
# For integration with larger DLC cluster, use ../hub/build/local/docker-compose.summaraizer.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: summaraizer-postgres
    environment:
      POSTGRES_DB: summaraizer
      POSTGRES_USER: summaraizer
      POSTGRES_PASSWORD: summaraizer
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summaraizer -d summaraizer"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - "" # Default profile (always starts unless explicitly excluded)

  redis:
    image: redis:7-alpine
    container_name: summaraizer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
    profiles:
      - ""

  chroma:
    image: chromadb/chroma:1.5.5
    container_name: summaraizer-chroma
    environment:
      ALLOW_RESET: "true"
      IS_PERSISTENT: "false"
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - ""

  summaraizer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: summaraizer
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      # Docker Compose specific overrides
      DATABASE_URL: postgresql://summaraizer:summaraizer@postgres:5432/summaraizer
      REDIS_BROKER_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      CHROMA_URL: http://chroma:8000
    volumes:
      # Mount app code for live reload
      - ./:/app:z
      # Mount virtual environment as named volume for pip persistence
      - summaraizer-venv:/app/.venv
      # Exclude node_modules and other build artifacts
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    stdin_open: true
    tty: true
    profiles:
      - ""

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: summaraizer-celery
    env_file:
      - .env
    environment:
      # Docker Compose specific overrides
      DATABASE_URL: postgresql://summaraizer:summaraizer@postgres:5432/summaraizer
      REDIS_BROKER_URL: redis://redis:6379/0
      REDIS_RESULT_URL: redis://redis:6379/1
      CHROMA_URL: http://chroma:8000
    volumes:
      - ./:/app:z
      - summaraizer-venv:/app/.venv
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "watchmedo",
        "auto-restart",
        "--directory=/app",
        "--pattern=*.py",
        "--recursive",
        "--",
        "celery",
        "-A",
        "app.async_jobs.celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "-Q",
        "workflows,embeds",
      ]
    healthcheck:
      test:
        ["CMD", "celery", "-A", "app.async_jobs.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    stdin_open: true
    tty: true
    profiles:
      - ""

volumes:
  postgres-data:
    driver: local
  chroma_data:
    driver: local
  redis-data:
    driver: local
  summaraizer-venv:
    driver: local

networks:
  default:
    name: summaraizer-network
