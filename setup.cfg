[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: integration tests (skip with: -m "not integration")
    unit: unit tests
    slow: slow tests
# Test Organization:
# - tests/unit/: Isolated unit tests (no external services)
# - tests/integration/: Integration tests (require real DB/HTTP)
# Run unit tests only: pytest tests/unit/
# Run integration tests: pytest tests/integration/
# Run all tests: pytest tests/
