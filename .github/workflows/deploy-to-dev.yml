name: Deploy to Kubernetes Dev

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        name: Build and Deploy to Dev
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Get image tag
              id: tags
              run: |
                  TAGVERSION=$(git describe --always --tags)
                  echo "tagversion=${TAGVERSION}" >> $GITHUB_OUTPUT

            - name: Build Docker image
              run: |
                  docker build -t summaraizerv2:${{ steps.tags.outputs.tagversion }} .

            - name: Log in to IONOS Docker Registry
              uses: docker/login-action@v3
              with:
                  registry: dlc-images-dev.cr.de-fra.ionos.com
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Push image to registry
              run: |
                  REGISTRY="dlc-images-dev.cr.de-fra.ionos.com"
                  IMGPATH="ild-thl/summaraizerv2-dev"
                  TAGVERSION=${{ steps.tags.outputs.tagversion }}

                  TAGIMAGE="${REGISTRY}/${IMGPATH}:${TAGVERSION}"
                  TAGIMAGE_LATEST="${REGISTRY}/${IMGPATH}:latest"

                  docker tag summaraizerv2:${TAGVERSION} "${TAGIMAGE}"
                  docker tag summaraizerv2:${TAGVERSION} "${TAGIMAGE_LATEST}"

                  echo "Pushing ${TAGIMAGE}..."
                  docker push "${TAGIMAGE}"

                  echo "Pushing ${TAGIMAGE_LATEST}..."
                  docker push "${TAGIMAGE_LATEST}"

            - name: Verify kubectl access
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV_BASE64 }}
              with:
                  args: cluster-info

            - name: Restart Kubernetes deployments
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV_BASE64 }}
              with:
                  args: rollout restart deployment/summaraizer -n default

            - name: Restart Celery worker
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV_BASE64 }}
              with:
                  args: rollout restart deployment/summaraizer-celery -n default

            - name: Wait for API rollout
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV_BASE64 }}
              with:
                  args: rollout status deployment/summaraizer -n default --timeout=5m

            - name: Wait for Celery rollout
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV_BASE64 }}
              with:
                  args: rollout status deployment/summaraizer-celery -n default --timeout=5m

            - name: Verify new image is deployed
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG_DEV_BASE64 }}
              with:
                  args: get pods -n default -l app=summaraizer -o jsonpath='{.items[*].spec.containers[0].image}'

            - name: Clean up
              if: always()
              run: |
                  docker image prune -f
                  docker builder prune -f
