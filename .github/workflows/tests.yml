name: CI - Unit Tests

on:
    pull_request:
        branches:
            - main
            - dev
    push:
        branches:
            - main
            - dev

jobs:
    unit-tests:
        name: Unit Tests
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              working-directory: ./summaraizer
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Run isolated unit tests
              working-directory: ./summaraizer
              run: |
                  pytest tests/unit/ -v --tb=short --cov=app --cov-report=term-missing
